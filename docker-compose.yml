services:
  db:
    image: postgres:16-alpine
    container_name: geotask-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gtp_vps_db_master_2026_xYz}
      POSTGRES_DB: geotask
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - geotask-network

  storage:
    image: minio/minio
    container_name: geotask-storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gtp_minio_secret_2026_Kqp}
    volumes:
      - minio-data:/data
    networks:
      - geotask-network
    ports:
      - "9000:9000"
      - "9001:9001"

  app:
    image: ghcr.io/dev-vra/geotask-pro-vps:latest
    container_name: geotask-app
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-gtp_vps_db_master_2026_xYz}@db:5432/geotask?schema=public
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD:-gtp_vps_db_master_2026_xYz}@db:5432/geotask?schema=public
      AWS_S3_ENDPOINT: http://storage:9000
      AWS_S3_BUCKET: task-attachments
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-gtp_minio_secret_2026_Kqp}
      AWS_REGION: us-east-1
      NODE_ENV: production
      NEXTAUTH_URL: https://geotask.duckdns.org
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-super-secret-gtp-vps-2026}
    depends_on:
      - db
      - storage
    networks:
      - geotask-network

  nginx:
    image: nginx:alpine
    container_name: geotask-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - geotask-network

networks:
  geotask-network:
    driver: bridge

volumes:
  pgdata:
  minio-data:
