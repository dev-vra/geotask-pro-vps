name: Process Recurring Tasks

on:
  schedule:
    # Roda todos os dias à meia-noite (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Recurrence API
        run: |
          curl -H "x-cron-token: ${{ secrets.CRON_SECRET }}" \
               -X GET "https://geotask-pro.vercel.app/api/tasks/cron"
