name: Deploy GeoTask-Pro to VPS

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx,scripts,prisma"
          target: "/home/geotask-pro"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/geotask-pro
            
            # Create environment file from secrets
            cat <<EOF > .env
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@db:5432/geotask?schema=public
            MINIO_ROOT_USER=admin
            EOF
            
            # Fix permissions
            chmod +x scripts/backup.sh scripts/duckdns.sh
            
            # Pull new images
            docker compose pull
            
            # Restart services
            docker compose up -d
            
            # Run Migrations and Seed
            echo "Running database migrations..."
            docker exec geotask-app npx prisma migrate deploy
            echo "Running database seed..."
            docker exec geotask-app npx prisma db seed
            
            # Setup Cron Jobs
            (crontab -l 2>/dev/null | grep -v "geotask-pro"; echo "0 3 * * * /home/geotask-pro/scripts/backup.sh") | crontab -
            (crontab -l 2>/dev/null | grep -v "geotask-pro"; echo "*/5 * * * * /home/geotask-pro/scripts/duckdns.sh") | crontab -
            
            echo "Deployment successful!"
